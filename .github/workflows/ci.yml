name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python scripts parse cleanly
        run: |
          python - << 'EOF'
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path("scripts").glob("*.py"):
              try:
                  ast.parse(f.read_text(encoding="utf-8"))
              except SyntaxError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("Syntax errors found:")
              for e in errors: print(" ", e)
              sys.exit(1)
          print(f"All {len(list(pathlib.Path('scripts').glob('*.py')))} scripts OK")
          EOF

      - name: Validate YAML workflows
        run: |
          python - << 'EOF'
          import pathlib, sys
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.run([sys.executable, "-m", "pip", "install", "pyyaml", "-q"])
              import yaml
          errors = []
          for f in pathlib.Path(".github/workflows").glob("*.yml"):
              try:
                  yaml.safe_load(f.read_text(encoding="utf-8"))
              except yaml.YAMLError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("YAML errors:")
              for e in errors: print(" ", e)
              sys.exit(1)
          print(f"All {len(list(pathlib.Path('.github/workflows').glob('*.yml')))} YAML files OK")
          EOF
